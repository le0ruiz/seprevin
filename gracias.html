<!DOCTYPE html>
<html lang="es-CL" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="SEPREVIN - Gracias por contactarnos. Te responderemos en menos de 24 horas.">
    <meta name="author" content="SEPREVIN">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Seguridad -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline'; 
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                   font-src 'self' https://fonts.gstatic.com data:; 
                   img-src 'self' data: https: blob:; 
                   frame-ancestors 'none'; 
                   base-uri 'self'; 
                   upgrade-insecure-requests;">
    
    <meta name="theme-color" content="#012D90">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <title>¡Gracias! | SEPREVIN - Solicitud Enviada</title>
    
    <style>
        :root {
            --primary: #012D90;
            --primary-dark: #001a5c;
            --primary-light: #0047AB;
            --accent: #00D4FF;
            --bg: #FEFEFE;
            --text: #0F172A;
            --text-muted: #475569;
            --success: #16A34A;
            --gradient-primary: linear-gradient(135deg, #012D90 0%, #0047AB 100%);
            --gradient-hero: linear-gradient(135deg, #012D90 0%, #001a5c 50%, #000d33 100%);
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-display: 'Space Grotesk', var(--font-sans);
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--gradient-hero);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-blob 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(1, 45, 144, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-blob 25s ease-in-out infinite reverse;
        }

        @keyframes float-blob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .thank-you-card {
            background: white;
            border-radius: var(--radius-2xl);
            padding: clamp(2rem, 5vw, 4rem);
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--success) 0%, #22C55E 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out 0.3s both;
            box-shadow: 0 10px 30px -5px rgba(22, 163, 74, 0.4);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-icon svg {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: checkmark 0.5s ease-out 0.5s both;
        }

        @keyframes checkmark {
            from {
                stroke-dasharray: 100;
                stroke-dashoffset: 100;
            }
            to {
                stroke-dasharray: 100;
                stroke-dashoffset: 0;
            }
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .subtitle {
            font-size: clamp(1rem, 1.5vw, 1.125rem);
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.7;
        }

        .info-box {
            background: linear-gradient(135deg, rgba(1, 45, 144, 0.05) 0%, rgba(0, 71, 171, 0.08) 100%);
            border: 1px solid rgba(1, 45, 144, 0.15);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-box p {
            margin: 0;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            min-height: 52px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 10px 30px -5px rgba(1, 45, 144, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px -5px rgba(1, 45, 144, 0.5);
        }

        .btn-icon {
            transition: transform var(--transition-base);
        }

        .btn:hover .btn-icon {
            transform: translateX(4px);
        }

        .logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 1;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        @media (max-width: 640px) {
            .logo {
                position: relative;
                top: auto;
                left: auto;
                margin-bottom: 2rem;
            }
            
            body {
                padding: 1rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="logo">
        <img src="logo_azul.jpeg" alt="SEPREVIN" onerror="this.style.display='none'">
    </div>

    <main>
        <div class="thank-you-card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            
            <h1>¡Solicitud Enviada!</h1>
            
            <p class="subtitle">
                Gracias por contactar a SEPREVIN. Hemos recibido tu información correctamente 
                y nuestro equipo técnico se pondrá en contacto contigo en menos de 24 horas hábiles.
            </p>
            
            <div class="info-box">
                <p>
                    📧 Revisa tu correo electrónico para confirmar los detalles de tu solicitud
                </p>
            </div>
            
            <a href="index.html" class="btn btn-primary">
                <span>Volver al inicio</span>
                <span class="btn-icon" aria-hidden="true">←</span>
            </a>
        </div>
    </main>

</body>
</html>
