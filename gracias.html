<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#012D90">
    <title>¡Gracias! | SEPREVIN</title>

    <!-- FAVICONS -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="manifest" href="site.webmanifest">

    <style>
        :root {
            --color-primary: rgb(1, 45, 144);
            --color-primary-dark: rgb(0, 30, 100);
            --color-bg: rgb(254, 254, 254);
            --color-surface: #ffffff;
            --color-text: #111827;
            --color-text-muted: #4b5563;
            --radius: 12px;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
        }

        .card {
            background: var(--color-surface);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-confirm {
            height: 60px;
            width: auto;
            margin-bottom: 1.5rem;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: rgba(1, 45, 144, 0.1);
            color: rgb(1, 45, 144);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        h1 {
            color: rgb(1, 45, 144);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--color-text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 2rem;
            font-weight: 600;
            border-radius: var(--radius);
            text-decoration: none;
            transition: all 0.3s ease;
            background-color: rgb(1, 45, 144);
            color: white;
            border: 2px solid rgb(1, 45, 144);
        }

        .btn:hover {
            background-color: rgb(0, 30, 100);
            border-color: rgb(0, 30, 100);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(1, 45, 144, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo_azul.svg" alt="SEPREVIN" class="logo-confirm">
        <div class="icon">✅</div>
        <h1>¡Solicitud enviada!</h1>
        <p>Gracias por contactar a <strong>SEPREVIN</strong>. Hemos recibido tu información correctamente. Nuestro equipo técnico te responderá en menos de 24 horas hábiles.</p>
        <a href="index.html" class="btn">← Volver al inicio</a>
    </div>
</body>
</html>
