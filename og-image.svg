<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#012D90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047AB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Elemento decorativo -->
  <circle cx="1000" cy="100" r="200" fill="#00D4FF" opacity="0.1"/>
  <circle cx="200" cy="500" r="150" fill="#00D4FF" opacity="0.1"/>
  
  <!-- Logo/Icono (placeholder - reemplazar con logo real) -->
  <rect x="80" y="80" width="100" height="100" rx="20" fill="url(#accent)"/>
  <text x="130" y="145" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">S</text>
  
  <!-- Título Principal -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    SEPREVIN
  </text>
  
  <!-- Subtítulo -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="32" fill="#00D4FF" font-weight="600">
    Excelencia en Gestión de Riesgos
  </text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="32" fill="#00D4FF" font-weight="600">
    Seguridad y Gestión Ambiental
  </text>
  
  <!-- Stats -->
  <g transform="translate(80, 450)">
    <rect width="250" height="80" rx="10" fill="rgba(255,255,255,0.1)"/>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">20+</text>
    <text x="125" y="65" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Años de Experiencia</text>
  </g>
  
  <g transform="translate(360, 450)">
    <rect width="250" height="80" rx="10" fill="rgba(255,255,255,0.1)"/>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">100%</text>
    <text x="125" y="65" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Cobertura Nacional</text>
  </g>
  
  <g transform="translate(640, 450)">
    <rect width="250" height="80" rx="10" fill="rgba(255,255,255,0.1)"/>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">ISO</text>
    <text x="125" y="65" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Certificaciones</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="600" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">
    Santiago, Chile • seprevin.cl
  </text>
</svg>